/* ============================================================
   Revive Wellness — Color tokens
   Lifted verbatim from the production site (index.html :root).
   Palette: orchard green + cold-press orange on warm cream,
   with a gold accent for highlights.
   ============================================================ */

:root {
  /* ---- Brand greens (orchard) ---- */
  --green:        #7cb342;  /* vivid leaf — primary brand green, section fills */
  --green-mid:    #5f9e33;  /* mid green — gradients, hover */
  --green-deep:   #4e7d2c;  /* deep green — footer, buttons on cream */
  --green-ink:    #2f4d1c;  /* near-black green — display headings, deepest fills */

  /* ---- Brand orange (cold-press citrus) ---- */
  --orange:       #e8732a;  /* signature orange — CTAs, emphasis italics, eyebrows */
  --orange-deep:  #c85a1a;  /* pressed / hover orange */

  /* ---- Gold accent ---- */
  --gold:         #d8ac4e;  /* highlight, ribbons, marquee accents */

  /* ---- Warm neutrals ---- */
  --cream:        #f6f3ea;  /* page background */
  --cream-2:      #efeadd;  /* alt section background, card fills */
  --ink:          #1f2415;  /* primary text on cream, dark buttons */
  --ink-2:        #3c4630;  /* secondary / body text */
  --muted:        #6b7155;  /* captions, meta, ingredient lists */

  /* ---- Fruit tints (product art backgrounds) ---- */
  --tint-orange:  #f7c9a3;  /* Orange juice */
  --tint-red:     #e0a9b6;  /* Red juice */
  --tint-green:   #b6d98a;  /* Green juice */
  --tint-yellow:  #f2df8f;  /* Lemonade */
  --peach:        #f4d3bd;  /* soft peach image placeholder */

  /* ---- Lines & surfaces ---- */
  --line:         rgba(31, 36, 21, 0.12);   /* hairline borders on cream */
  --line-on-dark: rgba(255, 255, 255, 0.15);/* hairline borders on green/ink */

  /* ============================================================
     Semantic aliases — reference these in components
     ============================================================ */
  --bg-page:        var(--cream);
  --bg-alt:         var(--cream-2);
  --bg-brand:       var(--green);
  --bg-brand-deep:  var(--green-deep);
  --bg-ink:         var(--green-ink);

  --surface-card:   #ffffff;
  --surface-sunk:   var(--cream-2);

  --text-heading:   var(--green-ink);
  --text-body:      var(--ink-2);
  --text-muted:     var(--muted);
  --text-on-brand:  #ffffff;
  --text-on-ink:    var(--cream);

  --accent:         var(--orange);
  --accent-hover:   var(--orange-deep);
  --accent-2:       var(--gold);

  --border-subtle:  var(--line);
  --border-brand:   var(--green-deep);
}

/* ============================================================
   Revive Wellness — Typography tokens
   Cormorant Garamond (display serif) · Fraunces (seal serif) ·
   Inter (body + UI). Display headings lean into the italic
   Cormorant "em" treatment in signature orange.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-display: 'Cormorant Garamond', 'Fraunces', Georgia, serif;
  --font-serif:   'Fraunces', 'Cormorant Garamond', Georgia, serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;

  /* ---- Type scale (display / Cormorant) ---- */
  --fs-display-xl: clamp(59.8px, 6.5vw, 109.2px); /* @kind font */
  --fs-display-lg: clamp(49.4px, 5vw, 80.6px); /* @kind font */
  --fs-display-md: clamp(41.6px, 4vw, 62.4px); /* @kind font */
  --fs-display-sm: 36.4px; /* @kind font */

  /* ---- Type scale (body / Inter) ---- */
  --fs-lede:  24.7px; /* @kind font */
  --fs-body:  20.8px; /* @kind font */
  --fs-sm:    18.85px; /* @kind font */
  --fs-xs:    16.9px; /* @kind font */
  --fs-eyebrow: 15.6px; /* @kind font */
  --fs-micro: 14.3px; /* @kind font */

  /* ---- Weights ---- */
  --fw-light:    300; /* @kind font */
  --fw-regular:  400; /* @kind font */
  --fw-medium:   500; /* @kind font */
  --fw-semibold: 600; /* @kind font */
  --fw-bold:     700; /* @kind font */

  /* ---- Line heights ---- */
  --lh-tight:   0.98; /* @kind font */
  --lh-snug:    1.1; /* @kind font */
  --lh-body:    1.6; /* @kind font */
  --lh-relaxed: 1.75; /* @kind font */

  /* ---- Letter spacing ---- */
  --ls-display:  0.01em; /* @kind font */
  --ls-eyebrow:  0.28em; /* @kind font */
  --ls-label:    0.14em; /* @kind font */
  --ls-caps:     0.2em; /* @kind font */
}

/* ============================================================
   Revive Wellness — Spacing, radii, shadows, motion
   ============================================================ */

:root {
  /* ---- Spacing scale ---- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;

  /* ---- Section rhythm ---- */
  --section-y:  90px;   /* vertical padding of a full section */
  --section-x:  48px;   /* horizontal gutter (desktop) */
  --section-x-mobile: 20px;
  --container:  1200px; /* max content width */
  --container-narrow: 720px;

  /* ---- Radii ---- */
  --radius-sm:   6px;    /* image tiles, inputs on prose pages */
  --radius-md:   8px;    /* form fields */
  --radius-lg:   14px;   /* service / cleanse cards */
  --radius-xl:   16px;   /* product cards */
  --radius-pill: 999px;  /* buttons, chips, badges */

  /* ---- Borders ---- */
  --border-w:      1px; /* @kind spacing */
  --border-w-btn:  1.6px; /* @kind spacing */

  /* ---- Shadows ---- */
  --shadow-bottle: drop-shadow(0 24px 40px rgba(0, 0, 0, 0.28)); /* hero product */
  --shadow-card:   0 18px 40px -22px rgba(31, 36, 21, 0.35);
  --shadow-modal:  0 40px 80px -20px rgba(0, 0, 0, 0.5);
  --shadow-soft:   0 8px 24px -14px rgba(31, 36, 21, 0.3);

  /* ---- Motion ---- */
  --ease:        cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */
  --dur-fast:    0.2s; /* @kind other */
  --dur-med:     0.25s; /* @kind other */
  --dur-slow:    0.4s; /* @kind other */

  /* ---- Layout ---- */
  --z-header:  60; /* @kind other */
  --z-modal:   1000; /* @kind other */
  --blur-glass: blur(4px); /* @kind other */
}

/* ============================================================
   Revive Wellness — Base element defaults + helpers
   Applied globally so raw HTML inherits the brand voice.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-page);
  color: var(--text-body);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }
img, svg { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; }

/* ---- Display headings ---- */
h1, h2, h3 { color: var(--text-heading); margin: 0; }

/* ---- Reusable helpers (optional) ---- */
.rw-display {
  font-family: var(--font-display);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--text-heading);
}
/* signature italic-orange emphasis inside a heading */
.rw-display em { color: var(--accent); font-style: italic; }

.rw-eyebrow {
  font-family: var(--font-body);
  font-size: var(--fs-eyebrow);
  font-weight: var(--fw-semibold);
  letter-spacing: var(--ls-eyebrow);
  text-transform: uppercase;
  color: var(--accent);
}

.rw-lede {
  font-size: var(--fs-lede);
  line-height: var(--lh-body);
  color: var(--text-body);
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
