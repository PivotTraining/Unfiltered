  <text class="micro" font-size="20" letter-spacing="9"><textPath href="#bot2" startOffset="50%" text-anchor="middle">RELEASE&#160;·&#160;REFRESH&#160;·&#160;REVIVE</textPath></text>
  <circle cx="300" cy="58" r="4" fill="#f6f3ea"/>
  <circle cx="300" cy="542" r="4" fill="#f6f3ea"/>
