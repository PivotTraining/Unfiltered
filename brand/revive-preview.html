<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revive Wellness — Seal</title>
<style>
 body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f6f3ea;color:#1f2415}
 .row{display:flex;flex-wrap:wrap}
 .cell{flex:1 1 300px;height:360px;display:flex;align-items:center;justify-content:center}
 .cream{background:#f6f3ea}.green{background:#7cb342}.dark{background:#1f2415}.white{background:#fff}
 .cap{padding:18px 24px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#6b7155;text-align:center}
 h1{font-family:Georgia,serif;text-align:center;padding:36px 0 0;margin:0;font-weight:500}
 .fav{display:flex;gap:24px;justify-content:center;align-items:center;padding:30px;background:#fff;flex-wrap:wrap}
 .fav img{border:1px solid #eee;border-radius:8px}
</style></head><body>
<h1>Revive Wellness — Seal / Emblem</h1>
<div class="cap">Full color on light &nbsp;·&nbsp; on brand green &nbsp;·&nbsp; reversed on dark</div>
<div class="row">
  <div class="cell cream"><img src="revive-seal.svg" width="300" height="300" alt="full color"></div>
  <div class="cell green"><img src="revive-seal-white.svg" width="300" height="300" alt="reversed"></div>
  <div class="cell dark"><img src="revive-seal-white.svg" width="300" height="300" alt="reversed on dark"></div>
</div>
<div class="cap">Scales down cleanly (favicon / app icon territory)</div>
<div class="fav">
  <img src="revive-seal.svg" width="120" height="120">
  <img src="revive-seal.svg" width="72" height="72">
  <img src="revive-seal.svg" width="44" height="44">
</div>
</body></html>
